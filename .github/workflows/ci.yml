name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build
        run: make
      - name: Test
        run: make test
      - name: Release build
        run: make release
      - name: ASAN build
        run: make asan
      - name: UBSAN build
        run: make ubsan
